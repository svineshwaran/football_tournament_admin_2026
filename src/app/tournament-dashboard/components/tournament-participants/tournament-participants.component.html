<form [formGroup]="form" class="space-y-8">
    <!-- Page Title -->
    <div>
        <h1 class="text-3xl font-black text-white tracking-tight">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.TITLE' | translate }}</h1>
        <p class="text-zinc-500 mt-1.5">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.SUBTITLE' | translate }}</p>
    </div>

    <!-- Setup & Dates -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Registration Requirements -->
        <div class="bg-black-card border border-black-border rounded-xl p-6">
            <h2 class="text-lg font-bold text-white mb-6">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.LIMITS_TITLE' | translate }}</h2>
            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block required-mark">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.MIN_TEAMS' | translate }}</label>
                        <input type="number" formControlName="minTeams"
                            class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all" />
                        <app-validation [control]="form.controls['minTeams']" label="Minimum teams" />
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block required-mark">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.MAX_TEAMS' | translate }}</label>
                        <input type="number" formControlName="maxTeams"
                            class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all" />
                        <app-validation [control]="form.controls['maxTeams']" label="Maximum teams" />
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block required-mark">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.SQUAD_SIZE' | translate }}</label>
                        <input type="number" formControlName="squadSize"
                            class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all" />
                        <app-validation [control]="form.controls['squadSize']" label="Squad size" />
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block required-mark">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.PLAYER_LIMIT' | translate }}</label>
                        <input type="number" formControlName="playerLimit"
                            class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all" />
                        <app-validation [control]="form.controls['playerLimit']" label="Player limit" />
                    </div>
                </div>
            </div>
        </div>

        <!-- Dates & Access -->
        <div class="bg-black-card border border-black-border rounded-xl p-6">
            <h2 class="text-lg font-bold text-white mb-6">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.DATES_TITLE' | translate }}</h2>
            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block required-mark">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.REG_OPEN' | translate }}</label>
                        <input type="date" formControlName="regOpenDate" [min]="todayDate"
                            class="w-full bg-white/5 border rounded-lg px-4 py-3 text-sm text-white focus:outline-none transition-all [color-scheme:dark]"
                            [ngClass]="form.controls['regOpenDate'].invalid && form.controls['regOpenDate'].touched ? 'border-red-500 ring-1 ring-red-500/50' : 'border-black-border focus:border-gold-400'" />
                        <app-validation [control]="form.controls['regOpenDate']" label="Registration open date" />
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block required-mark">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.REG_CLOSE' | translate }}</label>
                        <input type="date" formControlName="regCloseDate" [min]="form.controls['regOpenDate'].value || todayDate"
                            class="w-full bg-white/5 border rounded-lg px-4 py-3 text-sm text-white focus:outline-none transition-all [color-scheme:dark]"
                            [ngClass]="form.controls['regCloseDate'].invalid && form.controls['regCloseDate'].touched ? 'border-red-500 ring-1 ring-red-500/50' : 'border-black-border focus:border-gold-400'" />
                        <app-validation [control]="form.controls['regCloseDate']" label="Registration close date" />
                    </div>
                </div>
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.ENTRY_FEE' | translate }}</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 font-bold z-10">€</span>
                        <input type="number" formControlName="regFee"
                            class="w-full bg-white/5 border border-black-border rounded-lg pl-8 pr-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all" />
                    </div>
                    <app-validation [control]="form.controls['regFee']" label="Entry fee" />
                </div>
            </div>
        </div>
    </div>

</form>
