<div class="space-y-8">
    <!-- Page Title -->
    <div>
        <h1 class="text-3xl font-black text-white tracking-tight">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.TITLE' | translate }}</h1>
        <p class="text-zinc-500 mt-1.5">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.SUBTITLE' | translate }}</p>
    </div>

    <!-- Setup & Dates -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Registration Requirements -->
        <div class="bg-black-card border border-black-border rounded-xl p-6">
            <h2 class="text-lg font-bold text-white mb-6">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.LIMITS_TITLE' | translate }}</h2>
            <div class="space-y-5">
                <div>
                    <label
                        class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.TYPE' | translate }}</label>
                    <select [(ngModel)]="data.type"
                        class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all">
                        <option value="team" class="bg-black-card">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.TYPE_TEAM' | translate }}</option>
                        <option value="individual" class="bg-black-card">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.TYPE_INDIVIDUAL' | translate }}</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.MIN_TEAMS' | translate }}</label>
                        <input type="number" [(ngModel)]="data.minTeams"
                            class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all" />
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.MAX_TEAMS' | translate }}</label>
                        <input type="number" [(ngModel)]="data.maxTeams"
                            class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all" />
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.SQUAD_SIZE' | translate }}</label>
                        <input type="number" [(ngModel)]="data.squadSize"
                            class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all" />
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.PLAYER_LIMIT' | translate }}</label>
                        <input type="number" [(ngModel)]="data.playerLimit"
                            class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all" />
                    </div>
                </div>
            </div>
        </div>

        <!-- Dates & Access -->
        <div class="bg-black-card border border-black-border rounded-xl p-6">
            <h2 class="text-lg font-bold text-white mb-6">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.DATES_TITLE' | translate }}</h2>
            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.REG_OPEN' | translate }}</label>
                        <input type="date" [(ngModel)]="data.regOpenDate"
                            class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-sm text-white focus:border-gold-400 focus:outline-none transition-all [color-scheme:dark]" />
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.REG_CLOSE' | translate }}</label>
                        <input type="date" [(ngModel)]="data.regCloseDate"
                            class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-sm text-white focus:border-gold-400 focus:outline-none transition-all [color-scheme:dark]" />
                    </div>
                </div>
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.ENTRY_FEE' | translate }}</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 font-bold">€</span>
                        <input type="number" [(ngModel)]="data.regFee"
                            class="w-full bg-white/5 border border-black-border rounded-lg pl-8 pr-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all" />
                    </div>
                </div>
                <div class="pt-2">
                    <label
                        class="cursor-pointer label flex items-center justify-between bg-white/5 border border-black-border rounded-lg px-4 py-3 hover:border-gold-400/50 transition-all">
                        <div>
                            <span class="label-text text-white font-bold block">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.APPROVAL_REQUIRED' | translate }}</span>
                            <span class="text-[10px] text-zinc-500 block mt-1">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.APPROVAL_HINT' | translate }}</span>
                        </div>
                        <input type="checkbox" [(ngModel)]="data.approvalRequired" class="toggle toggle-warning" />
                    </label>
                </div>
            </div>
        </div>
    </div>

</div>
