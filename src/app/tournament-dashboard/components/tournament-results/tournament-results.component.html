<div class="space-y-8">
    <!-- Page Title -->
    <div>
        <h1 class="text-3xl font-black text-white tracking-tight">Results & Analytics</h1>
        <p class="text-zinc-500 mt-1.5">Configure how results are published and manage the standing tables.
        </p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-black-card border border-black-border rounded-xl p-6 space-y-6">
            <h2 class="text-lg font-bold text-white">Publishing Rules</h2>

            <div class="pt-2">
                <label
                    class="cursor-pointer label flex items-center justify-between bg-white/5 border border-black-border rounded-lg px-4 py-3 hover:border-gold-400/50 transition-all">
                    <div>
                        <span class="label-text text-white font-bold block">Auto-Publish Match
                            Results</span>
                        <span class="text-[10px] text-zinc-500 block mt-1">Make scores public right after
                            match ends</span>
                    </div>
                    <input type="checkbox" [(ngModel)]="data.autoPublish" class="toggle toggle-warning" />
                </label>
            </div>
        </div>

        <div
            class="bg-black-card border border-black-border rounded-xl flex flex-col items-center justify-center p-12 text-center">
            <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-zinc-600" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
            </div>
            <h3 class="text-lg font-bold text-white mb-1">Standings data empty</h3>
            <p class="text-sm text-zinc-500 mb-4">Match results will appear here once games are played.</p>
        </div>
    </div>
</div>
