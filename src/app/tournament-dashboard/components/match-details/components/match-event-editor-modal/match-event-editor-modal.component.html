@if (isOpen) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm transition-opacity" (click)="onClose()"></div>

    <!-- Modal Panel -->
    <div
        class="relative bg-black border border-black-border rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden animate-[scaleIn_0.2s_ease-out]">

        <!-- Header -->
        <div class="flex items-center justify-between p-6 border-b border-black-border bg-black-card/50">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 rounded-xl bg-gold-400/10 flex items-center justify-center border border-gold-400/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gold-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h2 class="text-xl font-black text-white tracking-tight">{{ eventData ? 'Edit Event' : 'Add Match Event'
                    }}</h2>
            </div>
            <button (click)="onClose()"
                class="text-zinc-500 hover:text-white transition-colors p-2 hover:bg-white/5 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Form Body -->
        <div class="p-6 md:p-8 space-y-6">

            <!-- Event Type & Time -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2 block">Event
                        Type</label>
                    <select [(ngModel)]="formData.type"
                        class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-sm font-bold text-white focus:border-gold-400 focus:outline-none transition-all appearance-none cursor-pointer">
                        <option value="goal" class="bg-black text-white">Goal</option>
                        <option value="yellow_card" class="bg-black text-white">Yellow Card</option>
                        <option value="red_card" class="bg-black text-white">Red Card</option>
                        <option value="substitution" class="bg-black text-white">Substitution</option>
                    </select>
                </div>
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2 block">Minute <span
                            class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="number" [(ngModel)]="formData.minute"
                            class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-sm font-bold text-white focus:border-gold-400 focus:outline-none transition-all pl-10"
                            placeholder="e.g. 45" />
                        <span
                            class="absolute left-4 top-1/2 transform -translate-y-1/2 text-zinc-400 font-black text-xs">'</span>
                    </div>
                </div>
            </div>

            <!-- Team Selection -->
            <div>
                <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2 block">Select
                    Team</label>
                <div class="flex gap-2">
                    <button (click)="formData.team = 'home'" [class.bg-gold-400]="formData.team === 'home'"
                        [class.text-black]="formData.team === 'home'" [class.bg-white_5]="formData.team !== 'home'"
                        [class.text-zinc-400]="formData.team !== 'home'"
                        class="flex-1 py-3 px-4 rounded-lg border border-black-border text-sm font-bold transition-all truncate text-center">
                        {{ match?.homeTeam?.shortName || match?.homeTeam?.name || 'Home Team' }}
                    </button>
                    <button (click)="formData.team = 'away'" [class.bg-gold-400]="formData.team === 'away'"
                        [class.text-black]="formData.team === 'away'" [class.bg-white_5]="formData.team !== 'away'"
                        [class.text-zinc-400]="formData.team !== 'away'"
                        class="flex-1 py-3 px-4 rounded-lg border border-black-border text-sm font-bold transition-all truncate text-center">
                        {{ match?.awayTeam?.shortName || match?.awayTeam?.name || 'Away Team' }}
                    </button>
                </div>
            </div>

            <!-- Player Name -->
            <div>
                <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2 block">
                    {{ formData.type === 'substitution' ? 'Player In' : 'Player Name' }} <span
                        class="text-red-500">*</span>
                </label>
                <input type="text" [(ngModel)]="formData.playerName"
                    class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-sm font-bold text-white focus:border-gold-400 focus:outline-none transition-all"
                    placeholder="Enter player's name" />
            </div>

            <!-- Details (Optional) -->
            <div>
                <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2 block">
                    {{ formData.type === 'substitution' ? 'Player Out' : 'Details / Assist (Optional)' }}
                </label>
                <input type="text" [(ngModel)]="formData.details"
                    class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-sm font-bold text-white focus:border-gold-400 focus:outline-none transition-all"
                    [placeholder]="formData.type === 'substitution' ? 'Name of player going out' : (formData.type === 'goal' ? 'e.g. Penalty, Header, or Assist: Messi' : 'e.g. Foul')" />
            </div>
        </div>

        <!-- Footer -->
        <div class="p-6 border-t border-black-border bg-black-card/50 flex justify-end gap-3">
            <button (click)="onClose()"
                class="px-6 py-2.5 rounded-lg border border-black-border text-zinc-400 hover:text-white hover:border-zinc-500 font-bold text-sm transition-all">
                Cancel
            </button>
            <button (click)="onSubmit()" [disabled]="isSubmitting"
                class="px-6 py-2.5 rounded-lg bg-gold-400 hover:bg-gold-400/90 text-black font-bold text-sm transition-all hover:shadow-[0_0_15px_rgba(212,175,55,0.4)] disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none flex items-center gap-2">
                @if (isSubmitting) {
                <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                Saving...
                } @else {
                {{ eventData ? 'Save Changes' : 'Add Event' }}
                }
            </button>
        </div>
    </div>
</div>
}
