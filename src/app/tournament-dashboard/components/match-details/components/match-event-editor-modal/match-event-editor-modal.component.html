@if (isOpen) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm transition-opacity" (click)="onClose()"></div>

    <!-- Modal Panel -->
    <div
        class="relative bg-black border border-black-border rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden animate-[scaleIn_0.2s_ease-out]">

        <!-- Header -->
        <div class="flex items-center justify-between p-6 border-b border-black-border bg-black-card/50">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 rounded-xl bg-gold-400/10 flex items-center justify-center border border-gold-400/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gold-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h2 class="text-xl font-black text-white tracking-tight">
                    {{ (eventData ? 'MATCH_DETAILS.TIMELINE.MODAL.TITLE_EDIT' : 'MATCH_DETAILS.TIMELINE.MODAL.TITLE_ADD') | translate }}
                </h2>
            </div>
            <button (click)="onClose()"
                class="text-zinc-500 hover:text-white transition-colors p-2 hover:bg-white/5 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Form Body -->
        <div class="p-6 md:p-8 space-y-6">

            <!-- Event Type & Time -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2 block">
                        {{ 'MATCH_DETAILS.TIMELINE.MODAL.TYPE' | translate }}
                    </label>
                    <select [(ngModel)]="formData.type"
                        class="select select-bordered w-full bg-black-card border-black-border text-sm font-bold text-white focus:border-gold-400 focus:outline-none transition-all hover:border-gold-400/50 cursor-pointer">
                        <option value="goal" class="bg-black text-white">{{ 'COMMON.GOAL' | translate }}</option>
                        <option value="own_goal" class="bg-black text-white">{{ 'COMMON.OWN_GOAL' | translate }}</option>
                        <option value="yellow_card" class="bg-black text-white">{{ 'COMMON.YELLOW_CARD' | translate }}</option>
                        <option value="red_card" class="bg-black text-white">{{ 'COMMON.RED_CARD' | translate }}</option>
                        <option value="substitution" class="bg-black text-white">{{ 'COMMON.SUBSTITUTION' | translate }}</option>
                        <option value="penalty" class="bg-black text-white">{{ 'COMMON.PENALTY' | translate }}</option>
                        <option value="corner" class="bg-black text-white">{{ 'COMMON.CORNER' | translate }}</option>
                        <option value="foul" class="bg-black text-white">{{ 'COMMON.FOUL' | translate }}</option>
                        <option value="offside" class="bg-black text-white">{{ 'COMMON.OFFSIDE' | translate }}</option>
                        <option value="free_kick" class="bg-black text-white">{{ 'COMMON.FREE_KICK' | translate }}</option>
                    </select>
                </div>
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2 block">
                        {{ 'MATCH_DETAILS.TIMELINE.MODAL.MINUTE' | translate }} <span class="text-red-500">*</span>
                    </label>
                    <div class="relative">
                        <input type="number" [(ngModel)]="formData.minute"
                            class="input input-bordered w-full bg-black-card border-black-border text-sm font-bold text-white focus:border-gold-400 focus:outline-none transition-all pl-10"
                            [placeholder]="'MATCH_DETAILS.TIMELINE.MODAL.PLACEHOLDER_MINUTE' | translate" />
                        <span
                            class="absolute left-4 top-1/2 transform -translate-y-1/2 text-zinc-400 font-black text-xs">'</span>
                    </div>
                </div>
            </div>

            <!-- Team Selection -->
            <div>
                <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2 block">
                    {{ 'MATCH_DETAILS.TIMELINE.MODAL.TEAM' | translate }}
                </label>
                <div class="flex gap-2">
                    <button (click)="onTeamSwitch('home')" 
                        [class.btn-warning]="formData.team === 'home'"
                        [class.btn-outline]="formData.team !== 'home'"
                        class="btn flex-1 border-black-border text-sm font-bold transition-all truncate">
                        {{ match?.homeTeam?.shortName || match?.homeTeam?.name || ('MATCH_DETAILS.INFO.HOME' | translate) }}
                    </button>
                    <button (click)="onTeamSwitch('away')" 
                        [class.btn-warning]="formData.team === 'away'"
                        [class.btn-outline]="formData.team !== 'away'"
                        class="btn flex-1 border-black-border text-sm font-bold transition-all truncate">
                        {{ match?.awayTeam?.shortName || match?.awayTeam?.name || ('MATCH_DETAILS.INFO.AWAY' | translate) }}
                    </button>
                </div>
            </div>

            <!-- Player Name (Dropdown) -->
            <div>
                <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">
                    {{ (formData.type === 'substitution' ? 'MATCH_DETAILS.TIMELINE.MODAL.SUB_OUT_PLAYER' : 'MATCH_DETAILS.TIMELINE.MODAL.PLAYER') | translate }} <span class="text-red-500">*</span>
                </label>
                <select [(ngModel)]="formData.playerName" name="playerName" required
                    class="select select-bordered w-full bg-black-card border-black-border text-sm font-bold text-white focus:border-gold-400 focus:outline-none transition-all hover:border-gold-400/50 cursor-pointer">
                    <option value="" disabled class="bg-black">{{ 'MATCH_DETAILS.DIRECT_FORM.SELECT_PLAYER' | translate }}</option>
                    @for (p of (formData.type === 'substitution' ? currentTeamStartingPlayers : currentTeamPlayers); track p.id) {
                    <option [value]="p.name" class="bg-black">
                        {{ p.name }} {{ p.jerseyNumber ? '(#' + p.jerseyNumber + ')' : '' }}
                    </option>
                    }
                </select>
            </div>

            <!-- Details / Assist (Dropdown + Optional Text) -->
            <div>
                <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">
                    {{ (formData.type === 'substitution' ? 'MATCH_DETAILS.TIMELINE.MODAL.SUB_IN_PLAYER' : (formData.type === 'goal' ? 'MATCH_DETAILS.TIMELINE.MODAL.ASSIST' : 'MATCH_DETAILS.TIMELINE.MODAL.DETAILS')) | translate }}
                    @if (formData.type === 'substitution') {
                    <span class="text-red-500">*</span>
                    }
                </label>
                
                @if (formData.type === 'goal' || formData.type === 'substitution') {
                <div class="space-y-3">
                    <select [(ngModel)]="formData.assistPlayerName" name="assistPlayerName"
                        class="select select-bordered w-full bg-black-card border-black-border text-sm font-bold text-white focus:border-gold-400 focus:outline-none transition-all hover:border-gold-400/50 cursor-pointer">
                        <option value="" class="bg-black">{{ (formData.type === 'substitution' ? 'MATCH_DETAILS.TIMELINE.MODAL.SELECT_SUB' : 'MATCH_DETAILS.TIMELINE.MODAL.NO_ASSIST') | translate }}</option>
                        @for (p of (formData.type === 'substitution' ? currentTeamSubPlayers : currentTeamPlayers); track p.id) {
                        <option [value]="p.name" [disabled]="p.name === formData.playerName" class="bg-black">
                            {{ p.name }}
                        </option>
                        }
                    </select>
                    @if (formData.type === 'goal') {
                    <input type="text" [(ngModel)]="formData.details" name="details"
                        class="input input-bordered w-full bg-black-card border-black-border text-sm font-bold text-white focus:border-gold-400 focus:outline-none transition-all"
                        [placeholder]="'MATCH_DETAILS.TIMELINE.MODAL.PLACEHOLDER_DETAILS_GOAL' | translate" />
                    }
                </div>
                } @else {
                <input type="text" [(ngModel)]="formData.details" name="details"
                    class="input input-bordered w-full bg-black-card border-black-border text-sm font-bold text-white focus:border-gold-400 focus:outline-none transition-all"
                    [placeholder]="'MATCH_DETAILS.TIMELINE.MODAL.PLACEHOLDER_DETAILS_GENERAL' | translate" />
                }
            </div>
        </div>

        <!-- Footer -->
        <div class="p-6 border-t border-black-border bg-black-card/50 flex justify-end gap-3">
            <button (click)="onClose()"
                class="btn btn-ghost text-zinc-400 hover:text-white font-bold text-sm">
                {{ 'COMMON.CANCEL' | translate }}
            </button>
            <button (click)="onSubmit()" [disabled]="isSubmitting"
                class="btn bg-gold-400 hover:bg-gold-400/90 text-black border-none font-bold text-sm transition-all shadow-[0_0_15px_rgba(212,175,55,0.4)] flex items-center gap-2">
                @if (isSubmitting) {
                <span class="loading loading-spinner loading-xs"></span>
                {{ 'MATCH_DETAILS.TIMELINE.MODAL.SUBMITTING' | translate }}
                } @else {
                {{ (eventData ? 'MATCH_DETAILS.TIMELINE.MODAL.SUBMIT_EDIT' : 'MATCH_DETAILS.TIMELINE.MODAL.SUBMIT_ADD') | translate }}
                }
            </button>
        </div>
    </div>
</div>
}
