<div
    class="flex items-center gap-2 p-1.5 bg-black-card border border-black-border rounded-xl w-full sm:w-fit overflow-x-auto no-scrollbar">
    
    <!-- Timeline Tab -->
    <button (click)="onTabClick('timeline')" [class.bg-white/10]="activeTab === 'timeline'"
        [class.text-white]="activeTab === 'timeline'" [class.shadow-sm]="activeTab === 'timeline'"
        [class.text-zinc-500]="activeTab !== 'timeline'" [class.hover:text-zinc-300]="activeTab !== 'timeline'"
        [class.hover:bg-white/5]="activeTab !== 'timeline'"
        class="flex-1 sm:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all whitespace-nowrap flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {{ 'MATCH_DETAILS.TABS.TIMELINE' | translate }}
    </button>

    <!-- Stats Tab -->
    <button (click)="onTabClick('stats')" [class.bg-white/10]="activeTab === 'stats'"
        [class.text-white]="activeTab === 'stats'" [class.shadow-sm]="activeTab === 'stats'"
        [class.text-zinc-500]="activeTab !== 'stats'" [class.hover:text-zinc-300]="activeTab !== 'stats'"
        [class.hover:bg-white/5]="activeTab !== 'stats'"
        class="flex-1 sm:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all whitespace-nowrap flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        {{ 'MATCH_DETAILS.TABS.STATS' | translate }}
    </button>

    <!-- Match Info Tab -->
    <button (click)="onTabClick('info')" [class.bg-white/10]="activeTab === 'info'"
        [class.text-white]="activeTab === 'info'" [class.shadow-sm]="activeTab === 'info'"
        [class.text-zinc-500]="activeTab !== 'info'" [class.hover:text-zinc-300]="activeTab !== 'info'"
        [class.hover:bg-white/5]="activeTab !== 'info'"
        class="flex-1 sm:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all whitespace-nowrap flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {{ 'MATCH_DETAILS.TABS.INFO' | translate }}
    </button>



    <!-- Standings Tab -->
    @if (showStandings) {
    <button (click)="onTabClick('standings')" [class.bg-white/10]="activeTab === 'standings'"
        [class.text-white]="activeTab === 'standings'" [class.shadow-sm]="activeTab === 'standings'"
        [class.text-zinc-500]="activeTab !== 'standings'" [class.hover:text-zinc-300]="activeTab !== 'standings'"
        [class.hover:bg-white/5]="activeTab !== 'standings'"
        class="flex-1 sm:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all whitespace-nowrap flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
        {{ 'MATCH_DETAILS.TABS.STANDINGS' | translate }}
    </button>
    }

</div>
