<div class="bg-black-card border border-black-border rounded-2xl p-6">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
        <div class="w-9 h-9 rounded-xl bg-gold-400/10 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gold-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
        </div>
        <h3 class="text-lg font-black text-white">Match Statistics</h3>
    </div>

    @if (isLoading()) {
    <div class="flex items-center justify-center py-12">
        <div class="w-8 h-8 rounded-full border-2 border-gold-400 border-t-transparent animate-spin"></div>
    </div>
    } @else {
    <!-- Team Headers -->
    <div class="grid grid-cols-3 items-center mb-4 px-2">
        <span class="text-sm font-black text-white text-left truncate">{{ homeTeamName }}</span>
        <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest text-center">Stat</span>
        <span class="text-sm font-black text-white text-right truncate">{{ awayTeamName }}</span>
    </div>

    <!-- Stat Rows -->
    <div class="space-y-4">
        @for (row of statsRows(); track row.label) {
        <div>
            <!-- Numbers row -->
            <div class="grid grid-cols-3 items-center mb-1.5 px-2">
                <span class="text-base font-black text-white">{{ row.home }}</span>
                <span class="text-[10px] font-bold text-zinc-500 text-center truncate px-1">{{ row.label }}</span>
                <span class="text-base font-black text-white text-right">{{ row.away }}</span>
            </div>
            <!-- Bar row -->
            <div class="flex gap-1 h-1.5 rounded-full overflow-hidden">
                <div class="bg-gold-400 rounded-l-full transition-all duration-500"
                    [style.width.%]="getBarPercent(row.home, row.away, 'home')">
                </div>
                <div class="bg-white/20 rounded-r-full transition-all duration-500"
                    [style.width.%]="getBarPercent(row.home, row.away, 'away')">
                </div>
            </div>
        </div>
        }
    </div>
    }
</div>
