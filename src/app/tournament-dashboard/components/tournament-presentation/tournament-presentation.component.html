<div class="space-y-8">
    <!-- Page Title -->
    <div>
        <h1 class="text-3xl font-black text-white tracking-tight">Public Presentation</h1>
        <p class="text-zinc-500 mt-1.5">Customize the look and feel of your tournament's public page.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-black-card border border-black-border rounded-xl p-6 space-y-6">
            <h2 class="text-lg font-bold text-white">Visual Identity</h2>

            <div>
                <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-2 block">Brand
                    Highlight Color</label>
                <div class="flex gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="themeColor" value="gold" [(ngModel)]="data.themeColor"
                            class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-gold-400 ring-4 ring-transparent peer-checked:ring-gold-400/30 transition-all border-2 border-black">
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="themeColor" value="blue" [(ngModel)]="data.themeColor"
                            class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-blue-500 ring-4 ring-transparent peer-checked:ring-blue-500/30 transition-all border-2 border-black">
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="themeColor" value="red" [(ngModel)]="data.themeColor"
                            class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-red-500 ring-4 ring-transparent peer-checked:ring-red-500/30 transition-all border-2 border-black">
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="themeColor" value="green" [(ngModel)]="data.themeColor"
                            class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-emerald-500 ring-4 ring-transparent peer-checked:ring-emerald-500/30 transition-all border-2 border-black">
                        </div>
                    </label>
                </div>
            </div>

            <div>
                <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">Player
                    & Fan Welcome Message</label>
                <textarea rows="4" [(ngModel)]="data.welcomeMsg"
                    placeholder="A short welcoming message displayed prominently on the public portal"
                    class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all resize-none"></textarea>
            </div>
        </div>

        <div class="bg-black-card border border-black-border rounded-xl p-6 space-y-6">
            <h2 class="text-lg font-bold text-white">Portal Features</h2>

            <div class="space-y-2">
                <label
                    class="cursor-pointer label flex items-center justify-between bg-white/5 border border-black-border rounded-lg px-4 py-4 hover:border-gold-400/50 transition-all">
                    <div>
                        <span class="label-text text-white font-bold block">Show Standings Widget</span>
                        <span class="text-xs text-zinc-500 block mt-0.5">Display real-time tables</span>
                    </div>
                    <input type="checkbox" [(ngModel)]="data.showStandings" class="toggle toggle-warning" />
                </label>

                <label
                    class="cursor-pointer label flex items-center justify-between bg-white/5 border border-black-border rounded-lg px-4 py-4 hover:border-gold-400/50 transition-all">
                    <div>
                        <span class="label-text text-white font-bold block">Top Scorers Leaderboard</span>
                        <span class="text-xs text-zinc-500 block mt-0.5">Show individual player stats</span>
                    </div>
                    <input type="checkbox" [(ngModel)]="data.showTopScorers" class="toggle toggle-warning" />
                </label>

                <label
                    class="cursor-pointer label flex items-center justify-between bg-white/5 border border-black-border rounded-lg px-4 py-4 opacity-50 cursor-not-allowed">
                    <div>
                        <span class="label-text text-zinc-400 font-bold block">Live Match Broadcast
                            integration</span>
                        <span class="text-xs text-zinc-600 block mt-0.5">Require premium plan</span>
                    </div>
                    <input type="checkbox" disabled class="toggle opacity-30" />
                </label>
            </div>
        </div>
    </div>
</div>
