<div class="space-y-8">
    <!-- Page Title -->
    <div>
        <h1 class="text-3xl font-black text-white tracking-tight">Finance & Rewards</h1>
        <p class="text-zinc-500 mt-1.5">Manage incoming fees, accepted payment methods, and outgoing prize
            pools.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Income & Payments -->
        <div class="bg-black-card border border-black-border rounded-xl p-6 space-y-6">
            <h2 class="text-lg font-bold text-white">Income & Payments</h2>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">Team
                        Registration Fee</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 font-bold">€</span>
                        <input type="number" [(ngModel)]="data.regFee"
                            class="w-full bg-white/5 border border-black-border rounded-lg pl-8 pr-4 py-3 text-emerald-400 font-bold focus:border-gold-400 focus:outline-none transition-all" />
                    </div>
                </div>
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">Accepted
                        Method</label>
                    <select [(ngModel)]="data.paymentMethod"
                        class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all">
                        <option value="bank" class="bg-black-card">Bank Transfer</option>
                        <option value="cash" class="bg-black-card">Cash on Matchday</option>
                        <option value="card" class="bg-black-card">Card / Online Gateway</option>
                        <option value="mixed" class="bg-black-card">Mixed / All available</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">Payment
                    Instructions</label>
                <textarea rows="4" [(ngModel)]="data.paymentInfo"
                    placeholder="e.g. Bank account details or payment link"
                    class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none transition-all resize-none"></textarea>
                <p class="text-[10px] text-zinc-500 mt-1">This will be shown to teams upon registration.</p>
            </div>
        </div>

        <!-- Prizes -->
        <div class="bg-black-card border border-black-border rounded-xl p-6 space-y-6">
            <h2 class="text-lg font-bold text-white">Prize Pool Setup</h2>

            <div>
                <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">Total
                    Prize Money</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 font-bold">€</span>
                    <input type="number" [(ngModel)]="data.prizeMoney" (ngModelChange)="onTotalPrizeChange()"
                        class="w-full bg-white/5 border border-black-border rounded-lg pl-8 pr-4 py-3 text-gold-400 font-bold focus:border-gold-400 focus:outline-none transition-all text-xl" />
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider block">Detailed Distribution</label>
                    <div class="text-[10px] font-mono tracking-wider flex items-center gap-3">
                        <span class="text-zinc-500">
                            SUM: €{{ getTotalDistribution() | number }}
                        </span>
                        <span [ngClass]="getRemaining() === 0 ? 'text-green-400' : 'text-amber-400'">
                            REMAINING: €{{ getRemaining() | number }}
                        </span>
                    </div>
                </div>
                
                <div class="flex items-center gap-4 bg-white/5 p-3 rounded-lg border focus-within:border-gold-400/50 transition-colors border-black-border">
                    <div class="w-8 h-8 rounded-full bg-gold-400 text-black flex items-center justify-center font-black text-xs shrink-0">1st</div>
                    <div class="flex-1 relative flex items-center">
                        <span class="absolute left-4 text-zinc-500 font-bold">€</span>
                        <input type="number" [(ngModel)]="data.prizeDistribution[0]" (ngModelChange)="onPrizeChange(0)" placeholder="0"
                            class="w-full bg-transparent border-none pl-8 pr-4 py-1 text-gold-400 font-bold focus:outline-none placeholder-zinc-700" />
                    </div>
                </div>

                <div class="flex items-center gap-4 bg-white/5 p-3 rounded-lg border focus-within:border-zinc-300/50 transition-colors border-black-border">
                    <div class="w-8 h-8 rounded-full bg-zinc-300 text-black flex items-center justify-center font-black text-xs shrink-0">2nd</div>
                    <div class="flex-1 relative flex items-center">
                        <span class="absolute left-4 text-zinc-500 font-bold">€</span>
                        <input type="number" [(ngModel)]="data.prizeDistribution[1]" (ngModelChange)="onPrizeChange(1)" placeholder="0"
                            class="w-full bg-transparent border-none pl-8 pr-4 py-1 text-zinc-300 font-bold focus:outline-none placeholder-zinc-700" />
                    </div>
                </div>

                <div class="flex items-center gap-4 bg-white/5 p-3 rounded-lg border focus-within:border-amber-600/50 transition-colors border-black-border">
                    <div class="w-8 h-8 rounded-full bg-amber-600 text-white flex items-center justify-center font-black text-xs shrink-0">3rd</div>
                    <div class="flex-1 relative flex items-center">
                        <span class="absolute left-4 text-zinc-500 font-bold">€</span>
                        <input type="number" [(ngModel)]="data.prizeDistribution[2]" (ngModelChange)="onPrizeChange(2)" placeholder="0"
                            class="w-full bg-transparent border-none pl-8 pr-4 py-1 text-amber-600 font-bold focus:outline-none placeholder-zinc-700" />
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
