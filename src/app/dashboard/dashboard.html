@if (isLoadingStats()) {
<div class="h-[calc(100vh-64px)] flex items-center justify-center">
    <app-loader></app-loader>
</div>
} @else {
<div class="max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <app-hero (createTournament)="openCreateModal()"></app-hero>

    <!-- System Overview & Live Activity -->
    <app-stats-board [platformStats]="platformStats()" [activityStats]="activityStats()"
        [showAllSections]="true"></app-stats-board>

    <!-- Main Content Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        <div class="lg:col-span-2 xl:col-span-3">
            <app-match-feed></app-match-feed>
        </div>
        <div class="lg:col-span-1 xl:col-span-1">
            <app-widgets (openCreateModal)="openCreateModal()"></app-widgets>
        </div>
    </div>
</div>
}

<!-- Create Tournament Modal -->
@if (showCreateModal()) {
<div class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0" (click)="closeCreateModal()"></div>

    <!-- Modal -->
    <div
        class="relative bg-black-card border border-gold-400/30 rounded-xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col shadow-[0_0_50px_rgba(255,215,0,0.1)]">

        <!-- Modal Header -->
        <div
            class="px-6 py-4 border-b border-black-border flex justify-between items-center bg-gradient-to-r from-black-card to-white/[0.02] shrink-0">
            <h3 class="text-lg font-black text-white uppercase tracking-wider flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gold-400" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                {{ 'DASHBOARD.MODAL.TITLE' | translate }}
            </h3>
            <button (click)="closeCreateModal()" class="text-zinc-500 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Modal Body -->
        <div class="p-6 space-y-5 overflow-y-auto flex-1">
            <!-- Tournament Name -->
            <div>
                <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-1.5 block">{{
                    'DASHBOARD.MODAL.NAME' | translate }} *</label>
                <input type="text" [(ngModel)]="newTournament.name"
                    [placeholder]="'DASHBOARD.MODAL.NAME_PLACEHOLDER' | translate"
                    class="w-full bg-black-main border border-black-border rounded-lg px-4 py-3 text-white placeholder-zinc-600 focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all" />
            </div>

            <!-- Description -->
            <div>
                <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-1.5 block">{{
                    'DASHBOARD.MODAL.DESCRIPTION' | translate }}</label>
                <textarea [(ngModel)]="newTournament.description"
                    [placeholder]="'DASHBOARD.MODAL.DESCRIPTION_PLACEHOLDER' | translate" rows="3"
                    class="w-full bg-black-main border border-black-border rounded-lg px-4 py-3 text-white placeholder-zinc-600 focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all resize-none"></textarea>
            </div>

            <!-- Dates Row -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-1.5 block">{{
                        'DASHBOARD.MODAL.START_DATE' | translate }}
                        *</label>
                    <input type="date" [(ngModel)]="newTournament.startDate"
                        class="w-full bg-black-main border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all [color-scheme:dark]" />
                </div>
                <div>
                    <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-1.5 block">{{
                        'DASHBOARD.MODAL.END_DATE' | translate }}</label>
                    <input type="date" [(ngModel)]="newTournament.endDate"
                        class="w-full bg-black-main border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all [color-scheme:dark]" />
                </div>
            </div>

            <!-- Max Teams & Prize Pool Row -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-1.5 block">{{
                        'DASHBOARD.MODAL.MAX_TEAMS' | translate }}</label>
                    <select [(ngModel)]="newTournament.maxTeams"
                        class="w-full bg-black-main border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all">
                        <option value="8" class="bg-black-card">8 Teams</option>
                        <option value="16" class="bg-black-card">16 Teams</option>
                        <option value="24" class="bg-black-card">24 Teams</option>
                        <option value="32" class="bg-black-card">32 Teams</option>
                        <option value="48" class="bg-black-card">48 Teams</option>
                        <option value="64" class="bg-black-card">64 Teams</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-1.5 block">{{
                        'DASHBOARD.MODAL.PRIZE_POOL' | translate }}</label>
                    <input type="text" [(ngModel)]="newTournament.prizePool"
                        [placeholder]="'DASHBOARD.MODAL.PRIZE_POOL_PLACEHOLDER' | translate"
                        class="w-full bg-black-main border border-black-border rounded-lg px-4 py-3 text-white placeholder-zinc-600 focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all" />
                </div>
            </div>

            <!-- Status -->
            <div>
                <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider mb-1.5 block">{{
                    'DASHBOARD.MODAL.STATUS' | translate }}</label>
                <select [(ngModel)]="newTournament.status"
                    class="w-full bg-black-main border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all">
                    <option value="draft" class="bg-black-card">{{ 'DASHBOARD.MODAL.STATUS_DRAFT' | translate }}
                    </option>
                    <option value="registration_open" class="bg-black-card">{{
                        'DASHBOARD.MODAL.STATUS_REGISTRATION_OPEN' | translate }}</option>
                </select>
            </div>
        </div>

        <!-- Modal Footer -->
        <div class="px-6 py-4 border-t border-black-border flex justify-end gap-3 bg-black-main/50 shrink-0">
            <button (click)="closeCreateModal()" [disabled]="isCreating()"
                class="px-5 py-2 rounded-lg font-bold text-zinc-400 hover:text-white hover:bg-white/5 transition-colors uppercase text-xs disabled:opacity-40">
                {{ 'COMMON.CANCEL' | translate }}
            </button>
            <button (click)="createTournament()"
                [disabled]="!newTournament.name || !newTournament.startDate || isCreating()"
                class="px-5 py-2 rounded-lg font-bold text-black-main bg-gold-400 hover:bg-gold-300 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2 uppercase text-xs shadow-[0_0_15px_rgba(255,215,0,0.2)]">
                @if (isCreating()) {
                <span class="loading loading-spinner w-3 h-3"></span>
                {{ 'DASHBOARD.MODAL.CREATING' | translate }}
                } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                {{ 'DASHBOARD.MODAL.SUBMIT' | translate }}
                }
            </button>
        </div>
    </div>
</div>
}

<!-- Toast Notification -->
@if (toastMessage()) {
<div
    class="fixed bottom-6 right-6 z-50 bg-black-card border border-gold-400/30 rounded-xl px-5 py-3 shadow-[0_0_30px_rgba(0,0,0,0.5)] flex items-center gap-3 animate-[slideUp_0.3s_ease-out]">
    <div class="w-8 h-8 rounded-full bg-gold-400/20 flex items-center justify-center shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gold-400" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
    </div>
    <span class="text-sm text-white font-bold">{{ toastMessage() }}</span>
</div>
}
