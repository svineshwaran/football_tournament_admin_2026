@if (show) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" (click)="close()"></div>

    <!-- Modal -->
    <div
        class="relative bg-black-card border border-black-border rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-[0_0_60px_rgba(250,204,21,0.15)]">

        <!-- Modal Header -->
        <div class="flex items-center justify-between p-6 border-b border-black-border">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gold-400/20 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gold-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-white">{{ 'TOURNAMENTS.CREATE' | translate }}</h2>
            </div>
            <button (click)="close()"
                class="w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-zinc-400 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Modal Body -->
        <div class="p-6 space-y-5">
            <!-- Tournament Name -->
            <div>
                <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{
                    'DASHBOARD.MODAL.NAME' | translate }} *</label>
                <input type="text" [(ngModel)]="newTournament.name"
                    [placeholder]="'DASHBOARD.MODAL.NAME_PLACEHOLDER' | translate"
                    class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white placeholder-zinc-600 focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all" />
            </div>

            <!-- Description -->
            <div>
                <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{
                    'DASHBOARD.MODAL.DESCRIPTION' | translate }}</label>
                <textarea [(ngModel)]="newTournament.description"
                    [placeholder]="'DASHBOARD.MODAL.DESCRIPTION_PLACEHOLDER' | translate" rows="3"
                    class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white placeholder-zinc-600 focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all resize-none"></textarea>
            </div>

            <!-- Dates Row -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{
                        'DASHBOARD.MODAL.START_DATE' | translate }} *</label>
                    <input type="date" [(ngModel)]="newTournament.startDate" [min]="todayDate"
                        class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all [color-scheme:dark]" />
                </div>
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{
                        'DASHBOARD.MODAL.END_DATE' | translate }}</label>
                    <input type="date" [(ngModel)]="newTournament.endDate" [min]="newTournament.startDate || todayDate"
                        class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all [color-scheme:dark]" />
                </div>
            </div>

            <!-- Format & Min Teams Row -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{ 'COMMON.FORMAT' | translate }}</label>
                    <select [(ngModel)]="newTournament.type" (change)="onFormatChange()"
                        class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all">
                        <option value="group" class="bg-black-card">{{ 'DASHBOARD.MODAL.FORMATS.GROUP' | translate }}</option>
                        <option value="group_knockout" class="bg-black-card">{{ 'DASHBOARD.MODAL.FORMATS.GROUP_KNOCKOUT' | translate }}</option>
                        <option value="knockout" class="bg-black-card">{{ 'DASHBOARD.MODAL.FORMATS.KNOCKOUT' | translate }}</option>
                        <option value="custom" class="bg-black-card">{{ 'DASHBOARD.MODAL.FORMATS.CUSTOM' | translate }}</option>
                    </select>
                </div>
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{ 'TOURNAMENT_DASHBOARD.PARTICIPANTS.MIN_TEAMS' | translate }}</label>
                    <div class="w-full bg-white/10 border border-white/5 rounded-lg px-4 py-3 text-zinc-400 transition-all flex items-center justify-between cursor-not-allowed">
                        <span>{{ newTournament.minTeams }} {{ 'COMMON.TEAMS_MINIMUM' | translate }}</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </div>
                </div>
            </div>

            <!-- Max Teams & Status Row -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{
                        'DASHBOARD.MODAL.MAX_TEAMS' | translate }}</label>
                    <select [(ngModel)]="newTournament.maxTeams"
                        class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all">
                        <option value="4" class="bg-black-card">4 {{ 'COMMON.TEAMS' | translate }}</option>
                        <option value="8" class="bg-black-card">8 {{ 'COMMON.TEAMS' | translate }}</option>
                        <option value="16" class="bg-black-card">16 {{ 'COMMON.TEAMS' | translate }}</option>
                        <option value="24" class="bg-black-card">24 {{ 'COMMON.TEAMS' | translate }}</option>
                        <option value="32" class="bg-black-card">32 {{ 'COMMON.TEAMS' | translate }}</option>
                        <option value="48" class="bg-black-card">48 {{ 'COMMON.TEAMS' | translate }}</option>
                        <option value="64" class="bg-black-card">64 {{ 'COMMON.TEAMS' | translate }}</option>
                    </select>
                </div>
                <div>
                    <label class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider mb-1.5 block">{{
                        'DASHBOARD.MODAL.STATUS' | translate }}</label>
                    <select [(ngModel)]="newTournament.status"
                        class="w-full bg-white/5 border border-black-border rounded-lg px-4 py-3 text-white focus:border-gold-400 focus:outline-none focus:ring-1 focus:ring-gold-400/50 transition-all">
                        <option value="draft" class="bg-black-card">{{ 'DASHBOARD.MODAL.STATUS_DRAFT' | translate }}
                        </option>
                        <option value="registration_open" class="bg-black-card">{{
                            'DASHBOARD.MODAL.STATUS_REGISTRATION_OPEN' | translate }}</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Modal Footer -->
        <div class="flex items-center justify-end gap-3 p-6 border-t border-black-border">
            <button (click)="close()" [disabled]="isCreating()"
                class="px-6 py-2.5 rounded-lg border border-black-border text-zinc-400 hover:text-white hover:border-zinc-500 font-bold transition-all duration-300 disabled:opacity-40">
                {{ 'COMMON.CANCEL' | translate }}
            </button>
            <button (click)="createTournament()"
                [disabled]="!newTournament.name || !newTournament.startDate || isCreating()"
                class="px-6 py-2.5 rounded-lg bg-gold-400 hover:bg-gold-400/90 text-black font-bold transition-all duration-300 hover:shadow-[0_0_20px_rgba(212,175,55,0.4)] disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:shadow-none flex items-center gap-2">
                @if (isCreating()) {
                <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                    </circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                {{ 'DASHBOARD.MODAL.CREATING' | translate }}
                } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                {{ 'TOURNAMENTS.CREATE' | translate }}
                }
            </button>
        </div>
    </div>
</div>

<!-- Loader Overlay while Creating -->
@if (isCreating()) {
<div class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm transition-all duration-500">
    <app-loader></app-loader>
</div>
}
}
